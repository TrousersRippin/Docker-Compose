---
services:
  mariadb:
    image: docker.io/library/mariadb:latest
    container_name: mariadb
    hostname: mariadb
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - MARIADB_AUTO_UPGRADE=${MARIADB_AUTO_UPGRADE}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_INITDB_SKIP_TZINFO=${MARIADB_INITDB_SKIP_TZINFO}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_USER=${MARIADB_USER}
    healthcheck:
      test: "healthcheck.sh --connect"
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
    ports:
      - ${MARIADB_PORT}:3306/tcp
    volumes:
      - photoprism-data:/var/lib/mysql:rw,Z
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs

  phpmyadmin:
    image: docker.io/phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    hostname: phpmyadmin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
      - PMA_HOST=${PMA_HOST}
      - PMA_PORT=${PMA_PORT}
    ports:
      - ${PHPMYADMIN_PORT}:80/tcp
    volumes:
      - $HOME/containers/storage/phpmyadmin/apache2.conf:/etc/apache2/apache2.conf:ro,Z
      - $HOME/containers/storage/phpmyadmin/sessions:/sessions:rw,Z
      - $HOME/containers/storage/phpmyadmin/themes/boodark-nord:/var/www/html/themes/boodark-nord:ro,Z
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs
      - traefik.enable=true
      - traefik.http.routers.phpmyadmin.entrypoints=http
      - traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.${HOST_DOMAIN}`)
      - traefik.http.middlewares.phpmyadmin-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.phpmyadmin.middlewares=phpmyadmin-https-redirect
      - traefik.http.routers.phpmyadmin-secure.entrypoints=https
      - traefik.http.routers.phpmyadmin-secure.rule=Host(`phpmyadmin.${HOST_DOMAIN}`)
      - traefik.http.routers.phpmyadmin-secure.tls=true
      - traefik.http.routers.phpmyadmin-secure.service=phpmyadmin
      - traefik.http.services.phpmyadmin.loadbalancer.server.port=80
      - traefik.docker.network=proxy

  photoprism:
    image: docker.io/photoprism/photoprism:latest
    container_name: photoprism
    hostname: photoprism
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - PHOTOPRISM_ADMIN_PASSWORD=${PHOTOPRISM_ADMIN_PASSWORD}
      - PHOTOPRISM_ADMIN_USER=${PHOTOPRISM_ADMIN_USER}
      - PHOTOPRISM_DATABASE_DRIVER=${PHOTOPRISM_DATABASE_DRIVER}
      - PHOTOPRISM_DATABASE_NAME=${PHOTOPRISM_DATABASE_NAME}
      - PHOTOPRISM_DATABASE_PASSWORD=${PHOTOPRISM_DATABASE_PASSWORD}
      - PHOTOPRISM_DATABASE_SERVER=${PHOTOPRISM_DATABASE_SERVER}
      - PHOTOPRISM_DATABASE_USER=${PHOTOPRISM_DATABASE_USER}
      - PHOTOPRISM_HTTP_PORT=${PHOTOPRISM_HTTP_PORT}
      - PHOTOPRISM_JPEG_SIZE=${PHOTOPRISM_JPEG_SIZE}
      - PHOTOPRISM_PNG_SIZE=${PHOTOPRISM_PNG_SIZE}
      - PHOTOPRISM_SITE_TITLE=${PHOTOPRISM_SITE_TITLE}
      - PHOTOPRISM_SITE_URL=${PHOTOPRISM_SITE_URL}
      - PHOTOPRISM_THUMB_FILTER=${PHOTOPRISM_THUMB_FILTER}
      - PHOTOPRISM_THUMB_SIZE=${PHOTOPRISM_THUMB_SIZE}
      - PHOTOPRISM_THUMB_SIZE_UNCACHED=${PHOTOPRISM_THUMB_SIZE_UNCACHED}
      - PHOTOPRISM_THUMB_UNCACHED=${PHOTOPRISM_THUMB_UNCACHED}
    ports:
      - ${PHOTOPRISM_PORT}:2342/tcp
    volumes:
      - $HOME/containers/storage/photoprism:/photoprism/storage:rw,Z
      - /mnt/hdd/photos:/photoprism/originals:ro,z
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs
      - traefik.enable=true
      - traefik.http.routers.photoprism.entrypoints=http
      - traefik.http.routers.photoprism.rule=Host(`photoprism.${HOST_DOMAIN}`)
      - traefik.http.middlewares.photoprism-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.photoprism.middlewares=photoprism-https-redirect
      - traefik.http.routers.photoprism-secure.entrypoints=https
      - traefik.http.routers.photoprism-secure.rule=Host(`photoprism.${HOST_DOMAIN}`)
      - traefik.http.routers.photoprism-secure.tls=true
      - traefik.http.routers.photoprism-secure.service=photoprism
      - traefik.http.services.photoprism.loadbalancer.server.port=2342
      - traefik.docker.network=proxy

volumes:
  photoprism-data:
    external: true

networks:
  proxy:
    external: true