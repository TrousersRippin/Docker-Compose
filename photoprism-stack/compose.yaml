---
services:
  mariadb:
    image: docker.io/library/mariadb:latest
    container_name: mariadb
    hostname: mariadb
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    healthcheck:
      test: "healthcheck.sh --connect"
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
    ports:
      - 3306:3306/tcp
    volumes:
      - photoprism-data:/var/lib/mysql:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs

  phpmyadmin:
    image: docker.io/phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    hostname: phpmyadmin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    ports:
      - 8765:80/tcp
    volumes:
      - $HOME/containers/storage/phpmyadmin/apache2.conf:/etc/apache2/apache2.conf:ro
      - $HOME/containers/storage/phpmyadmin/sessions:/sessions:rw
      - $HOME/containers/storage/phpmyadmin/themes/boodark-nord:/var/www/html/themes/boodark-nord:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs

  photoprism:
    image: docker.io/photoprism/photoprism:latest
    container_name: photoprism
    hostname: photoprism
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    ports:
      - 2342:2342/tcp
    volumes:
      - $HOME/containers/storage/photoprism:/photoprism/storage:rw
      - /mnt/hdd/photos:/photoprism/originals:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs

volumes:
  photoprism-data:
    external: true

networks:
  proxy:
    external: true