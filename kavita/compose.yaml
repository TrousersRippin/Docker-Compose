---
services:
  kavita:
    image: docker.io/jvmilazz0/kavita:latest
    container_name: kavita
    hostname: kavita
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=Europe/Stockholm
    user: ${UID:-1000}:${GID:-1000}
    ports:
      - 5000:5000/tcp
    volumes:
      - $HOME/containers/storage/kavita/config:/kavita/config:rw
      - /mnt/hdd/books:/books:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs

networks:
  proxy:
    external: true