---
services:
  tautulli:
    image: docker.io/tautulli/tautulli:latest
    container_name: tautulli
    hostname: tautulli
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    ports:
      - ${TAUTULLI_PORT}:8181/tcp
    volumes:
      - $HOME/containers/storage/tautulli/config:/config:rw,Z
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs
      - traefik.enable=true
      - traefik.http.routers.tautulli.entrypoints=http
      - traefik.http.routers.tautulli.rule=Host(`tautulli.${HOST_DOMAIN}`)
      - traefik.http.middlewares.tautulli-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.tautulli.middlewares=tautulli-https-redirect
      - traefik.http.routers.tautulli-secure.entrypoints=https
      - traefik.http.routers.tautulli-secure.rule=Host(`tautulli.${HOST_DOMAIN}`)
      - traefik.http.routers.tautulli-secure.tls=true
      - traefik.http.routers.tautulli-secure.service=tautulli
      - traefik.http.services.tautulli.loadbalancer.server.port=8181
      - traefik.docker.network=proxy

networks:
  proxy:
    external: true