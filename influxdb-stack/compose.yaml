---
services:
  telegraf:
    image: docker.io/library/telegraf:latest
    container_name: telegraf
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    user: 1000:103
    ports:
      - 8125:8125/tcp
    volumes:
      - $HOME/containers/storage/telegraf/config/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /:/hostfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs

  influxdb:
    image: docker.io/library/influxdb:latest
    container_name: influxdb
    hostname: influxdb
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    ports:
      - 8086:8086/tcp
    volumes:
      - $HOME/containers/storage/influxdb/config:/etc/influxdb2:rw
      - influxdb-data:/var/lib/influxdb2:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - telegraf
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs

volumes:
  influxdb-data:
    name: influxdb-data

networks:
  proxy:
    external: true