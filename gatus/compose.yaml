---
services:
  gatus:
    image: ghcr.io/twin/gatus:latest
    container_name: gatus
    hostname: gatus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=Europe/Stockholm
      - GATUS_CONFIG_PATH=/config
      - GATUS_PORT=8899
    ports:
      - 8899:8899/tcp
    volumes:
      - /opt/stacks/gatus/config/config.yaml:/config:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy

networks:
  proxy:
    external: true