---
services:
  redis:
    image: docker.io/library/redis:latest
    container_name: redis
    hostname: redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy

  immich:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich
    hostname: immich
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
      - DB_HOSTNAME=${DB_HOSTNAME}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE_NAME=${DB_DATABASE_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOSTNAME=${REDIS_HOSTNAME}
    ports:
      - 2283:2283/tcp
    volumes:
      - /opt/stacks/immich/upload:/usr/src/app/upload:rw
      - /opt/stacks/immich/data:/data:rw
      - /mnt/hdd/photos:/usr/src/app/photos:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
    networks:
      - proxy

networks:
  proxy:
    external: true