---
services:
  memos:
    image: docker.io/neosmemo/memos:latest
    container_name: memos
    hostname: memos
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
    ports:
      - ${MEMOS_PORT}:5230/tcp
    volumes:
      - $HOME/containers/storage/memos/config:/var/opt/memos:rw,Z
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs
      - traefik.enable=true
      - traefik.http.routers.memos.entrypoints=http
      - traefik.http.routers.memos.rule=Host(`memos.${HOST_DOMAIN}`)
      - traefik.http.middlewares.memos-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.memos.middlewares=memos-https-redirect
      - traefik.http.routers.memos-secure.entrypoints=https
      - traefik.http.routers.memos-secure.rule=Host(`memos.${HOST_DOMAIN}`)
      - traefik.http.routers.memos-secure.tls=true
      - traefik.http.routers.memos-secure.service=memos
      - traefik.http.services.memos.loadbalancer.server.port=5230
      - traefik.docker.network=proxy

networks:
  proxy:
    external: true