---
services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    ports:
      - ${PROWLARR_PORT}:9696/tcp
    volumes:
      - $HOME/containers/storage/prowlarr/config:/config:rw,Z
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - proxy
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - logging=promtail
      - logging_jobname=containerlogs
      - traefik.enable=true
      - traefik.http.routers.prowlarr.entrypoints=http
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.${HOST_DOMAIN}`)
      - traefik.http.middlewares.prowlarr-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.prowlarr.middlewares=prowlarr-https-redirect
      - traefik.http.routers.prowlarr-secure.entrypoints=https
      - traefik.http.routers.prowlarr-secure.rule=Host(`prowlarr.${HOST_DOMAIN}`)
      - traefik.http.routers.prowlarr-secure.tls=true
      - traefik.http.routers.prowlarr-secure.service=prowlarr
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
      - traefik.docker.network=proxy

networks:
  proxy:
    external: true